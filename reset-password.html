<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password</title>
  <style>body{font-family:system-ui,Segoe UI,Roboto,Arial;padding:24px;max-width:720px;margin:auto}label{display:block;margin-top:12px}</style>
</head>
<body>
  <h1>Reset Password</h1>
  <div id="message">Loading...</div>

  <form id="reset-form" style="display:none">
    <label>New password<br><input id="new-password" type="password" required minlength="8" /></label>
    <label>Confirm password<br><input id="confirm-password" type="password" required minlength="8" /></label>
    <button type="submit">Set new password</button>
  </form>

  <script>
    // Set this to your Supabase Functions base URL after deploy, e.g.:
    // window.FUNCTIONS_BASE_URL = 'https://your-project.functions.supabase.co'
    window.FUNCTIONS_BASE_URL = window.FUNCTIONS_BASE_URL || '';

    function qs(name){ return new URLSearchParams(location.search).get(name); }

    const token = qs('token');
    const msg = document.getElementById('message');
    const form = document.getElementById('reset-form');

    if (!token) { msg.textContent = 'No token provided.'; }
    else if (!window.FUNCTIONS_BASE_URL) { msg.innerHTML = 'FUNCTIONS_BASE_URL not set. Edit this file to add your functions URL.'; }
    else {
      msg.textContent = 'Token present — enter a new password.';
      form.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const p = document.getElementById('new-password').value;
      const c = document.getElementById('confirm-password').value;
      if (p !== c) { msg.textContent = 'Passwords do not match.'; return; }
      msg.textContent = 'Updating password...';
      try {
        const res = await fetch(`${window.FUNCTIONS_BASE_URL}/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: p })
        });
        const txt = await res.text();
        if (res.ok) {
          msg.textContent = 'Password updated — you can now log in.';
          form.style.display = 'none';
        } else {
          msg.textContent = 'Failed: ' + txt;
        }
      } catch (err) { msg.textContent = 'Error: ' + err.message; }
    });
  </script>
</body>
</html>
